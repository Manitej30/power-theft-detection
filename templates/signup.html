<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Sign Up - Power Theft Detection in Smart Grids Using Quantum Machine Learning</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Free HTML Templates" name="keywords">
    <meta content="Free HTML Templates" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet"> 

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <!-- Flaticon Font -->
    <link href="../static/lib/flaticon/font/flaticon.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="../static/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
    <link href="../static/lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="../static/css/style.css" rel="stylesheet">
    
    <!-- Auth Pages Common Stylesheet -->
    <link href="../static/css/auth.css" rel="stylesheet">
</head>

<body>

    

    <!-- Signup Form Container -->
    <div class="form-container">
        <div class="form-header">
            <i class="fas fa-user-plus"></i>
            <h2>Create Account</h2>
            <p>Sign up to get started</p>
        </div>

        {% if message %}
        <div class="alert-message show error">
            {{ message }}
        </div>
        {% endif %}

        <form id="signup-form" action="/signup" method="POST">
            <div class="form-row">
                <div class="form-group form-group-half">
                    <label for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input 
                            type="text" 
                            name="user" 
                            id="username" 
                            placeholder="Enter your username" 
                            required 
                            autocomplete="username"
                        >
                    </div>
                </div>

                <div class="form-group form-group-half">
                    <label for="fullname">
                        <i class="fas fa-id-card"></i> Full Name
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-id-card"></i>
                        <input 
                            type="text" 
                            name="name" 
                            id="fullname" 
                            placeholder="Enter your full name" 
                            required 
                            autocomplete="name"
                        >
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group form-group-half">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            name="email" 
                            id="email" 
                            placeholder="Enter your email" 
                            required 
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group form-group-half">
                    <label for="mobile">
                        <i class="fas fa-phone"></i> Mobile
                    </label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input 
                            type="tel" 
                            name="mobile" 
                            id="mobile" 
                            placeholder="Enter your mobile" 
                            required 
                            autocomplete="tel"
                        >
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> Password
                </label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input 
                        type="password" 
                        name="password" 
                        id="password" 
                        placeholder="Enter your password" 
                        required 
                        autocomplete="new-password"
                    >
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-user-plus"></i> Sign Up
            </button>
        </form>

        <div class="form-footer">
            <p style="color: #7f8c8d; font-size: 14px; margin-bottom: 10px;">
                Already have an account? 
                <a href="/login">Sign In</a>
            </p>
        </div>
    </div>



    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="../static/lib/easing/easing.min.js"></script>
    <script src="../static/lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="../static/lib/tempusdominus/js/moment.min.js"></script>
    <script src="../static/lib/tempusdominus/js/moment-timezone.min.js"></script>
    <script src="../static/lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js"></script>

    <!-- Contact Javascript File -->
    <script src="../static/mail/jqBootstrapValidation.min.js"></script>
    <script src="../static/mail/contact.js"></script>

    <!-- Template Javascript -->
    <script src="../static/js/main.js"></script>
</body>

</html>
